    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* إزالة المستطيل الأزرق نهائياً */
            user-select: none; /* منع تحديد النص اثناء الضغط السريع */
        }

        body {
            font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            cursor: default;
            transition: background 0.3s ease;
        }

        /* =============== أنميشن السيوف الافتتاحي القوي =============== */
        .sword-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2000;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            background: rgba(0,0,0,0.7);
            opacity: 1;
            transition: opacity 0.8s cubic-bezier(0.77, 0, 0.18, 1);
        }
        
        .sword-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .sword-left, .sword-right {
            position: absolute;
            width: 80px;
            height: 80%;
            background: linear-gradient(135deg, #e0e0e0, #a0a0a0, #ffffff, #c0c0c0);
            clip-path: polygon(40% 0%, 60% 0%, 55% 100%, 45% 100%);
            box-shadow: 0 0 30px rgba(255,255,200,0.8), 0 0 60px rgba(255,215,0,0.5);
            transition: all 1.2s cubic-bezier(0.34, 1.2, 0.64, 1);
            transform-origin: center;
        }
        
        .sword-left {
            left: 20%;
            transform: translateX(-30%) rotate(0deg);
            animation: swordGlow 1.5s infinite alternate;
        }
        
        .sword-right {
            right: 20%;
            transform: translateX(30%) rotate(0deg);
            animation: swordGlow 1.5s infinite alternate 0.3s;
        }
        
        @keyframes swordGlow {
            0% { filter: drop-shadow(0 0 5px gold); opacity: 0.9; }
            100% { filter: drop-shadow(0 0 25px #ffaa33); opacity: 1; }
        }
        
        /* تفعيل انفتاح السيوف */
        .sword-overlay.open .sword-left {
            transform: translateX(-150%) rotate(-25deg);
            opacity: 0;
        }
        
        .sword-overlay.open .sword-right {
            transform: translateX(150%) rotate(25deg);
            opacity: 0;
        }
        
        .sword-overlay.open {
            backdrop-filter: blur(0px);
            background: rgba(0,0,0,0);
            pointer-events: none;
        }
        
        /* شاشة تحميل بسيطة (تختفي بعد السيوف) */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f0c29;
            z-index: 1999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 1s, visibility 1s;
            opacity: 1;
            visibility: visible;
        }
        
        /* أنيميشن الجزيئات والخلفية */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(255,255,255,0.7), transparent);
            border-radius: 50%;
            animation: floatParticle 15s infinite linear;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(102,126,234,0.3), transparent);
            border-radius: 50%;
            animation: glowMove 12s infinite alternate;
        }

        @keyframes glowMove {
            0% { transform: translate(0, 0) scale(1); opacity: 0.2; }
            100% { transform: translate(80px, 80px) scale(1.6); opacity: 0.5; }
        }

        /* البطاقة الرئيسية - تحسين الجوال */
        .profile-card {
            position: relative;
            z-index: 1;
            background: rgba(15, 25, 35, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 35px 25px;
            max-width: 560px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: scale(0.95) translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .profile-card.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* الصورة الشخصية */
        .profile-img {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: profilePulse 2.5s infinite, borderRotate 5s linear infinite;
            position: relative;
        }

        @keyframes profilePulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(102,126,234,0.7); }
            50% { transform: scale(1.03); box-shadow: 0 0 0 15px rgba(102,126,234,0); }
        }

        @keyframes borderRotate {
            0% { background: linear-gradient(0deg, #667eea, #764ba2, #f093fb); }
            100% { background: linear-gradient(360deg, #667eea, #764ba2, #f093fb); }
        }

        .profile-img img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.4);
            transition: transform 0.3s;
        }

        .profile-img img:hover {
            transform: scale(1.08);
        }

        /* النصوص */
        .username {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a58eff, #ffb3fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .handle {
            text-align: center;
            color: rgba(255,255,255,0.75);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .bio {
            text-align: center;
            color: rgba(255,255,255,0.85);
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 14px;
            padding: 0 5px;
        }

        /* روابط التواصل - تحسين الجوال والضغط */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            border-radius: 28px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: all 0.25s ease;
            gap: 14px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .social-btn:active {
            transform: scale(0.97);
            background: rgba(255,255,255,0.2);
        }
        
        @media (hover: hover) {
            .social-btn:hover {
                transform: translateX(6px) scale(1.01);
                filter: brightness(1.12);
                border-color: rgba(255,255,255,0.4);
            }
        }

        .social-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-icon svg {
            width: 26px;
            height: 26px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .social-info {
            flex: 1;
        }

        .social-name {
            font-size: 15px;
            font-weight: 700;
        }

        .social-username {
            font-size: 11px;
            opacity: 0.75;
            font-family: monospace;
        }

        /* مشغل الموسيقى المحسن */
        .music-player {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(18px);
            border-radius: 60px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.25);
            cursor: pointer;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .music-player:active {
            transform: scale(0.96);
        }

        .music-icon {
            font-size: 22px;
            animation: musicRotate 4s linear infinite;
        }

        @keyframes musicRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .music-info .music-title {
            font-size: 11px;
            font-weight: 600;
        }
        
        .music-status {
            font-size: 9px;
            opacity: 0.7;
        }

        .play-pause {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 6px;
            border-radius: 30px;
            transition: 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .play-pause:active {
            transform: scale(0.9);
        }
        
        .wave {
            display: flex;
            gap: 3px;
            align-items: center;
        }

        .wave span {
            width: 3px;
            height: 12px;
            background: #a285ff;
            border-radius: 3px;
            animation: waveAnim 0.9s infinite ease;
        }

        .wave span:nth-child(1) { animation-delay: 0s; }
        .wave span:nth-child(2) { animation-delay: 0.2s; }
        .wave span:nth-child(3) { animation-delay: 0.4s; }
        .wave span:nth-child(4) { animation-delay: 0.6s; }

        @keyframes waveAnim {
            0%, 100% { height: 8px; }
            50% { height: 22px; }
        }

        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(12px);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            font-size: 24px;
            transition: 0.2s;
            color: white;
            -webkit-tap-highlight-color: transparent;
        }
        
        .theme-toggle:active {
            transform: rotate(90deg) scale(0.95);
        }

        .footer {
            margin-top: 28px;
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,0.45);
        }
        
        /* تحسينات للجوال */
        @media (max-width: 500px) {
            .profile-card {
                padding: 28px 20px;
            }
            .username {
                font-size: 26px;
            }
            .social-btn {
                padding: 10px 16px;
            }
            .sword-left, .sword-right {
                width: 45px;
                height: 70%;
            }
            .sword-left { left: 10%; }
            .sword-right { right: 10%; }
        }
        
        /* الوضع المضيء */
        body.light {
            background: linear-gradient(135deg, #e0c3fc, #b0d4ff, #c2e9fb);
        }
        body.light .profile-card {
            background: rgba(245, 240, 255, 0.75);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.1);
        }
        body.light .username {
            background: linear-gradient(135deg, #2c3e66, #8e2de2);
            -webkit-background-clip: text;
        }
        body.light .bio, body.light .handle, body.light .social-username, body.light .social-name {
            color: #1a1a2e;
        }
        body.light .social-btn {
            background: rgba(0,0,0,0.05);
            border-color: rgba(0,0,0,0.1);
            color: #111;
        }
        body.light .footer {
            color: #2c2c54;
        }

        const socialData = [
            { name: "Email", username: "ufeelgg@gmail.com", icon: icons.email, url: "mailto:hurley@example.com", class: "email" },
            { name: "GitHub", username: "hurleyxyz", icon: icons.github, url: "https://github.com/ufeelgg-netizen", class: "github" },
            { name: "Discord", username: "hurleyxyz", icon: icons.discord, url: "https://discord.gg/WH3zqsuv", class: "discord" },
            { name: "X (Twitter)", username: "@hurleyxyz", icon: icons.twitter, url: "https://x.com/AliYoun2696890", class: "twitter" },
            { name: "TikTok", username: "@hurleyxyz", icon: icons.tiktok, url: "https://www.tiktok.com/@hurleyxyz", class: "tiktok" },
            { name: "WhatsApp", username: "hurleyxyz", icon: icons.whatsapp, url: "https://wa.me/94404537", class: "whatsapp" },
            { name: "Instagram", username: "@hurleyxyz", icon: icons.instagram, url: "https://www.instagram.com/hurleyxyz_", class: "instagram" },
            { name: "Facebook", username: "hurleyxyz", icon: icons.facebook, url: "https://www.facebook.com/share/1CdmnFusmC/", class: "facebook" }
        ];

        function loadSocialLinks() {
            const container = document.getElementById('socialLinks');
            container.innerHTML = '';
            socialData.forEach(social => {
                const btn = document.createElement('a');
                btn.href = social.url;
                btn.className = `social-btn ${social.class}`;
                btn.target = "_blank";
                btn.innerHTML = `<div class="social-icon">${social.icon}</div><div class="social-info"><div class="social-name">${social.name}</div><div class="social-username">${social.username}</div></div>`;
                btn.addEventListener('click', (e) => { e.preventDefault(); window.open(social.url, '_blank'); });
                container.appendChild(btn);
            });
        }

        function createBackgroundAnimation() {
            const bg = document.getElementById('bgAnimation');
            for(let i = 0; i < 45; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                let size = Math.random() * 5 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = Math.random() * 12 + 6 + 's';
                particle.style.background = `radial-gradient(circle, rgba(180,150,255,0.8), rgba(100,80,200,0.3))`;
                bg.appendChild(particle);
            }
            for(let i=0;i<4;i++) {
                let glow = document.createElement('div');
                glow.classList.add('glow');
                glow.style.left = Math.random() * 90 + '%';
                glow.style.top = Math.random() * 90 + '%';
                bg.appendChild(glow);
            }
        }

        // --- الموسيقى المحسنة ---
        let audio = null;
        let isPlaying = false;
        function initMusic() {
            try {
                audio = new Audio();
                audio.src = 'other/sound.mp3';
                audio.loop = true;
                audio.volume = 0.25;
                fetch('other/sound.mp3', { method: 'HEAD' }).catch(()=>console.log("تحقق من الملف"));
            } catch(e) { console.log("لا يوجد دعم"); }
        }
        function toggleMusic() {
            if(!audio) return;
            if(isPlaying) {
                audio.pause();
                isPlaying = false;
                document.getElementById('playPauseBtn').textContent = '▶️';
                document.getElementById('musicStatus').innerText = '⏸ متوقفة';
                document.getElementById('waveEffect').style.display = 'none';
            } else {
                audio.play().then(()=>{
                    isPlaying = true;
                    document.getElementById('playPauseBtn').textContent = '⏸';
                    document.getElementById('musicStatus').innerText = '🎵 تشغيل';
                    document.getElementById('waveEffect').style.display = 'flex';
                }).catch(()=>alert("🔊 اضغط على زر التشغيل لتشغيل الموسيقى"));
            }
        }
        
        // --- أنميشن السيوف ودخول البطاقة ---
        function startSwordAnimation() {
            const swordOverlay = document.getElementById('swordOverlay');
            const loadingScreen = document.getElementById('loadingScreen');
            const profileCard = document.getElementById('profileCard');
            
            // بعد ثانية ونصف تبدأ حركة السيوف
            setTimeout(() => {
                swordOverlay.classList.add('open');
                setTimeout(() => {
                    swordOverlay.style.display = 'none';
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => {
                        loadingScreen.style.visibility = 'hidden';
                        profileCard.classList.add('visible');
                    }, 400);
                }, 1100);
            }, 1200);
        }
        
        // تبديل الثيم
        function toggleTheme() {
            document.body.classList.toggle('light');
            const btn = document.getElementById('themeBtn');
            if(document.body.classList.contains('light')) btn.textContent = '☀️';
            else btn.textContent = '🌙';
        }
        
        window.addEventListener('load', () => {
            createBackgroundAnimation();
            loadSocialLinks();
            initMusic();
            startSwordAnimation();
            document.getElementById('playPauseBtn').addEventListener('click', (e) => { e.stopPropagation(); toggleMusic(); });
            document.getElementById('musicPlayer').addEventListener('click', (e) => { if(!e.target.closest('.play-pause')) toggleMusic(); });
            document.getElementById('themeBtn').addEventListener('click', toggleTheme);
            // منع القائمة المنبثقة الطويلة
            document.querySelectorAll('.social-btn, .theme-toggle, .music-player, .play-pause').forEach(el => {
                el.addEventListener('contextmenu', (e) => e.preventDefault());
            });
        });
    </script>
</body>
</html>
