<html lang="en">

    <title>hurleyxyz</title>
    <link rel="icon" type="image/png" href="https://cdn.discordapp.com/attachments/1436453150046290042/1520783556459102219/8936eeb2ceba5549935e6cb77ac4f2e5.jpg?ex=6a42738e&is=6a41220e&hm=5ee53bbe9a4a565a66dad356ac36ef782694ac1d4e577cc103c684b5067f7cb4&">
    <style>

            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tajawal', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Intro - faster */
        .intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            background: linear-gradient(135deg, #0f0c29, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease, visibility 0.4s;
            will-change: opacity, visibility;
        }

        .intro.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .intro-content {
            text-align: center;
            animation: introBounce 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .intro-content h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #667eea, #f093fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 3px;
        }

        @keyframes introBounce {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Background - optimized */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }

        /* Stars - fewer, faster */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.4;
            animation: starFall linear infinite;
            will-change: transform;
        }

        @keyframes starFall {
            0% { transform: translateY(-100px) translateX(0); opacity: 0.4; }
            100% { transform: translateY(100vh) translateX(60px); opacity: 0; }
        }

        /* Main content */
        .main-content {
            position: relative;
            z-index: 1;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease-in-out, visibility 0.3s;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-content.visible {
            opacity: 1;
            visibility: visible;
        }

        .profile-card {
            background: rgba(15, 25, 35, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 35px 30px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.08);
            animation: cardSlide 0.5s ease-out;
            transition: transform 0.25s ease;
            will-change: transform;
        }

        .profile-card:hover {
            transform: translateY(-3px);
        }

        @keyframes cardSlide {
            from { transform: translateY(30px) scale(0.97); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Profile image - optimized */
        .profile-img {
            width: 130px;
            height: 130px;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: borderRotate 4s linear infinite;
            transition: transform 0.25s ease;
            will-change: transform;
        }

        .profile-img:hover {
            transform: scale(1.04);
        }

        .profile-img img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.25);
            animation: imgFloat 2.5s ease-in-out infinite;
            will-change: transform;
        }

        @keyframes imgFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        @keyframes borderRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .username {
            text-align: center;
            font-size: 34px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #667eea, #f093fb, #fff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientMove 2.5s ease-in-out infinite;
            letter-spacing: 2px;
            will-change: background-position;
        }

        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .handle {
            text-align: center;
            color: rgba(255,255,255,0.5);
            margin-bottom: 28px;
            font-size: 14px;
            letter-spacing: 1px;
            transition: color 0.2s ease;
        }

        .handle:hover {
            color: rgba(255,255,255,0.85);
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            padding: 11px 18px;
            border-radius: 25px;
            color: white;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            gap: 14px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            will-change: transform;
        }

        .social-btn:active {
            transform: scale(0.96);
        }

        @media (hover: hover) {
            .social-btn:hover {
                transform: translateX(5px);
                background: rgba(255,255,255,0.1);
                border-color: rgba(255,255,255,0.15);
            }
        }

        .social-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .social-btn:hover .social-icon svg {
            transform: scale(1.1);
        }

        .social-info {
            flex: 1;
            min-width: 0;
        }

        .social-name {
            font-size: 15px;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .social-btn:hover .social-name {
            color: #a285ff;
        }

        .social-username {
            font-size: 11px;
            opacity: 0.6;
            font-family: monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 50%;
            width: 46px;
            height: 46px;
            cursor: pointer;
            font-size: 20px;
            z-index: 100;
            transition: all 0.2s ease;
            will-change: transform;
        }

        .theme-toggle:hover {
            transform: scale(1.08);
            background: rgba(255,255,255,0.2);
        }

        .theme-toggle:active {
            transform: scale(0.9);
        }

        /* Light Theme */
        body.light .animated-bg {
            background: linear-gradient(135deg, #e0c3fc, #b0d4ff, #c2e9fb);
        }
        body.light .profile-card {
            background: rgba(245, 240, 255, 0.88);
        }
        body.light .username {
            background: linear-gradient(135deg, #2c3e66, #8e2de2, #2c3e66);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            animation: gradientMove 2.5s ease-in-out infinite;
        }
        body.light .handle, body.light .social-username, body.light .social-name {

        }
        body.light .social-btn {
            background: rgba(0,0,0,0.04);
            border-color: rgba(0,0,0,0.06);
            color: #111;
        }
        body.light .social-icon svg {

        }
        body.light .social-btn:hover {

            border-color: rgba(0,0,0,0.12);
        }
        body.light .social-btn:hover .social-name {
            color: #764ba2;
        }
        body.light .theme-toggle {
            background: rgba(0,0,0,0.08);
            border-color: rgba(0,0,0,0.08);
        }

        /* Modal - faster */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            animation: modalFade 0.2s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes modalFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-box {
            background: linear-gradient(145deg, #1a1a2e, #24243e);
            border-radius: 30px;
            padding: 35px 30px;
            max-width: 360px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            animation: modalPop 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            will-change: transform, opacity;
        }

        body.light .modal-box {
            background: linear-gradient(145deg, #f5f0ff, #e8e0f5);
            border-color: rgba(0,0,0,0.06);
        }

        @keyframes modalPop {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 12px;
            border: 3px solid #667eea;
            object-fit: cover;
            animation: imgFloat 2.5s ease-in-out infinite;
            will-change: transform;
        }

        .modal-name {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #667eea, #f093fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 3px;
        }

        body.light .modal-name {
            background: linear-gradient(135deg, #2c3e66, #8e2de2);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .modal-handle {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            margin-bottom: 16px;
        }

        body.light .modal-handle {
            color: rgba(0,0,0,0.4);
        }

        .modal-platform {
            font-size: 12px;
            color: rgba(255,255,255,0.25);
            margin-bottom: 14px;
            letter-spacing: 1px;
        }

        body.light .modal-platform {
            color: rgba(0,0,0,0.25);
        }

        .modal-link-btn {
            display: inline-block;
            padding: 11px 32px;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            margin-top: 3px;
            will-change: transform;
        }

        .modal-link-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.35);
        }

        .modal-link-btn:active {
            transform: scale(0.95);
        }

        .modal-close {
            margin-top: 12px;
            background: rgba(255,255,255,0.06);
            border: none;
            color: rgba(255,255,255,0.5);
            padding: 6px 22px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        body.light .modal-close {
            color: rgba(0,0,0,0.4);
            background: rgba(0,0,0,0.04);
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.12);
            color: white;
        }

        body.light .modal-close:hover {
            background: rgba(0,0,0,0.08);
            color: black;
        }

        @media (max-width: 500px) {
            .profile-card {
                padding: 22px 18px;
            }
            .username {
                font-size: 26px;
            }
            .intro-content h1 {
                font-size: 30px;
            }
            .profile-img {
                width: 100px;
                height: 100px;
            }
            .profile-img img {
                width: 92px;
                height: 92px;
            }
            .modal-box {
                padding: 25px 18px;
            }
            .modal-img {
                width: 75px;
                height: 75px;
            }
            .modal-name {
                font-size: 20px;
            }
        }

        @media (max-width: 380px) {
            .profile-card {
                padding: 18px 14px;
            }
            .username {
                font-size: 22px;
            }
            .social-btn {
                padding: 9px 14px;
                gap: 10px;
            }
            .social-icon svg {
                width: 20px;
                height: 20px;
            }
            .social-name {
                font-size: 13px;
            }
        }
    </style>

    ];

    let currentLink = '';

    function openModal(platform, url) {
        currentLink = url;
        document.getElementById('modalPlatform').textContent = platform;
        document.getElementById('modalLink').href = url;
        document.getElementById('modalOverlay').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
        document.body.style.overflow = '';
    }

    function loadSocialLinks() {
        const container = document.getElementById('socialLinks');
        container.innerHTML = '';
        socialData.forEach(social => {
            const btn = document.createElement('div');
            btn.className = 'social-btn';
            btn.innerHTML = `
                <div class="social-icon">${social.icon}</div>
                <div class="social-info">
                    <div class="social-name">${social.name}</div>
                    <div class="social-username">${social.username}</div>
                </div>
            `;
            btn.addEventListener('click', () => {
                openModal(social.name, social.url);
            });
            container.appendChild(btn);
        });
    }

    function createStars() {
        const bg = document.getElementById('animatedBg');
        for(let i = 0; i < 40; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + '%';
            star.style.width = (Math.random() * 2 + 1) + 'px';
            star.style.height = star.style.width;
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            star.style.animationDelay = (Math.random() * 6) + 's';
            bg.appendChild(star);
        }
    }

    let isLight = false;
    function toggleTheme() {
        isLight = !isLight;
        if(isLight) {
            document.body.classList.add('light');
            document.getElementById('themeBtn').textContent = '☀️';
        } else {
            document.body.classList.remove('light');
            document.getElementById('themeBtn').textContent = '🌙';
        }
    }

    window.addEventListener('load', () => {
        loadSocialLinks();
        createStars();
        
        setTimeout(() => {
            const intro = document.getElementById('intro');
            intro.classList.add('fade-out');
            setTimeout(() => {
                intro.style.display = 'none';
                document.getElementById('mainContent').classList.add('visible');
            }, 400);
        }, 1000);
        
        document.getElementById('themeBtn').addEventListener('click', toggleTheme);
        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if(e.target === document.getElementById('modalOverlay')) {
                closeModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if(e.key === 'Escape') closeModal();
        });
    });
</script>
</body>
</html>
