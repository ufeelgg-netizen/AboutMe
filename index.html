<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐡𝐮𝐫𝐥𝐞𝐲𝐱𝐲𝐳 </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            cursor: default;
        }

        /* شاشة التحميل */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f0c29;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 1s, visibility 1s;
        }

        .loader {
            width: 80px;
            height: 80px;
            border: 5px solid rgba(102,126,234,0.3);
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            margin-top: 20px;
            font-size: 18px;
        }

        /* أنيميشن الخلفية */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(255,255,255,0.8), transparent);
            border-radius: 50%;
            animation: floatParticle 15s infinite linear;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(102,126,234,0.3), transparent);
            border-radius: 50%;
            animation: glowMove 10s infinite alternate;
        }

        @keyframes glowMove {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: translate(100px, 100px) scale(1.5); opacity: 0.6; }
        }

        /* البطاقة الرئيسية */
        .profile-card {
            position: relative;
            z-index: 1;
            background: rgba(15, 25, 35, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 45px 35px;
            max-width: 580px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
            animation: cardGlow 3s ease-in-out infinite, slideIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: scale(0.9);
        }

        .profile-card.visible {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes cardGlow {
            0%, 100% { box-shadow: 0 25px 50px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1); }
            50% { box-shadow: 0 25px 60px rgba(102,126,234,0.3), 0 0 0 2px rgba(102,126,234,0.5); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px) rotateX(-10deg) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0) scale(1);
            }
        }

        /* الصورة الشخصية */
        .profile-img {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: profilePulse 2s infinite, borderRotate 4s linear infinite;
            position: relative;
        }

        @keyframes profilePulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(102,126,234,0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(102,126,234,0); }
        }

        @keyframes borderRotate {
            0% { background: linear-gradient(0deg, #667eea, #764ba2, #f093fb); }
            100% { background: linear-gradient(360deg, #667eea, #764ba2, #f093fb); }
        }

        .profile-img img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.3);
            transition: transform 0.3s;
        }

        .profile-img img:hover {
            transform: scale(1.1);
        }

        /* النصوص */
        .username {
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #667eea, #f093fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            animation: textShine 3s infinite;
        }

        @keyframes textShine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .handle {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .handle span {
            background: rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        .bio {
            text-align: center;
            color: rgba(255,255,255,0.85);
            margin-bottom: 35px;
            line-height: 1.8;
            font-size: 15px;
        }

        /* روابط التواصل */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            animation: fadeInUp 0.6s ease-out backwards;
            gap: 15px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .social-btn:hover::before {
            left: 100%;
        }

        .social-btn:hover {
            transform: translateX(8px) scale(1.02);
            filter: brightness(1.15);
            border-color: rgba(255,255,255,0.3);
        }

        /* أيقونات SVG */
        .social-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-icon svg {
            width: 28px;
            height: 28px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
        }

        .social-info {
            flex: 1;
        }

        .social-name {
            font-size: 16px;
            margin-bottom: 3px;
            font-weight: 700;
        }

        .social-username {
            font-size: 12px;
            opacity: 0.8;
            font-family: monospace;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* تأخيرات الأنيميشن */
        .email { animation-delay: 0.05s; }
        .github { animation-delay: 0.1s; }
        .discord { animation-delay: 0.15s; }
        .twitter { animation-delay: 0.2s; }
        .tiktok { animation-delay: 0.25s; }
        .whatsapp { animation-delay: 0.3s; }
        .instagram { animation-delay: 0.35s; }
        .facebook { animation-delay: 0.4s; }

        /* مشغل الموسيقى */
        .music-player {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 2;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            animation: musicFloat 2s ease-in-out infinite;
            cursor: pointer;
            transition: all 0.3s;
        }

        .music-player:hover {
            transform: scale(1.05);
            background: rgba(0,0,0,0.8);
        }

        @keyframes musicFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .music-icon {
            font-size: 24px;
            animation: musicRotate 3s linear infinite;
            display: inline-block;
        }

        @keyframes musicRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .music-info {
            display: flex;
            flex-direction: column;
        }

        .music-title {
            font-size: 12px;
            color: white;
            font-weight: 500;
        }

        .music-status {
            font-size: 10px;
            color: rgba(255,255,255,0.6);
        }

        .play-pause {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .play-pause:hover {
            transform: scale(1.1);
        }

        /* مؤشر الصوت المتغير */
        .wave {
            display: flex;
            gap: 3px;
            align-items: center;
            margin-left: 5px;
        }

        .wave span {
            width: 3px;
            height: 12px;
            background: #667eea;
            border-radius: 3px;
            animation: wave 1s ease-in-out infinite;
        }

        .wave span:nth-child(1) { animation-delay: 0s; }
        .wave span:nth-child(2) { animation-delay: 0.2s; }
        .wave span:nth-child(3) { animation-delay: 0.4s; }
        .wave span:nth-child(4) { animation-delay: 0.6s; }

        @keyframes wave {
            0%, 100% { height: 12px; }
            50% { height: 25px; }
        }

        /* زر الوضع المظلم */
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 24px;
            transition: 0.3s;
            color: white;
        }

        .theme-toggle:hover {
            transform: rotate(180deg) scale(1.1);
            background: rgba(255,255,255,0.3);
        }

        /* تذييل */
        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>

    <script>
        // إعداد الموسيقى - تم التعديل لقراءة ملف sound.mp3 مباشرة
        let audio = null;
        let isPlaying = false;
        
        function initMusic() {
            try {
                // إنشاء عنصر الصوت
                audio = new Audio();
                
                // تحديد ملف الصوت الخاص بك مباشرة
                audio.src = 'other/sound.mp3';
                audio.loop = true;
                audio.volume = 0.3; // صوت خفيف
                
                // التحقق من وجود الملف
                fetch('other/sound.mp3', { method: 'HEAD' })
                    .then(response => {
                        if(response.ok) {
                            console.log('✅ تم العثور على ملف sound.mp3');
                            document.querySelector('.music-title').textContent = '🎵 sound.mp3';
                        } else {
                            console.log('❌ لم يتم العثور على الملف في المسار: other/sound.mp3');
                            document.querySelector('.music-title').textContent = '⚠️ ملف الصوت غير موجود';
                        }
                    })
                    .catch(() => {
                        console.log('❌ خطأ في تحميل الملف: other/sound.mp3');
                        document.querySelector('.music-title').textContent = '⚠️ تأكد من وجود sound.mp3';
                    });
                
            } catch(e) {
                console.log('مشغل الموسيقى غير متاح:', e);
            }
        }
        
        function playMusic() {
            if(audio) {
                audio.play().then(() => {
                    console.log('🎵 تم تشغيل الموسيقى بنجاح');
                }).catch(e => {
                    console.log('تحتاج إلى النقر على الصفحة أولاً لتشغيل الموسيقى');
                    alert('🔊 اضغط على زر التشغيل ▶️ لتشغيل الموسيقى');
                });
            }
        }
        
        function pauseMusic() {
            if(audio) {
                audio.pause();
            }
        }
        
        function toggleMusic() {
            if(isPlaying) {
                pauseMusic();
                isPlaying = false;
                document.getElementById('playPauseBtn').textContent = '▶️';
                document.getElementById('musicStatus').textContent = '⏸ متوقفة';
                document.getElementById('waveEffect').style.display = 'none';
            } else {
                playMusic();
                isPlaying = true;
                document.getElementById('playPauseBtn').textContent = '⏸';
                document.getElementById('musicStatus').textContent = '🎵 تشغيل';
                document.getElementById('waveEffect').style.display = 'flex';
            }

        function loadSocialLinks() {
            const container = document.getElementById('socialLinks');
            container.innerHTML = '';
            
            socialData.forEach(social => {
                const btn = document.createElement('a');
                btn.href = social.url;
                btn.className = `social-btn ${social.class}`;
                btn.target = "_blank";
                
                btn.innerHTML = `
                    <div class="social-icon">${social.icon}</div>
                    <div class="social-info">
                        <div class="social-name">${social.name}</div>
                        <div class="social-username">${social.username}</div>
                    </div>
                `;
                
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.open(social.url, '_blank');
                });
                
                container.appendChild(btn);
            });
        }

        function createBackgroundAnimation() {
            const bg = document.getElementById('bgAnimation');
            for(let i = 0; i < 60; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = Math.random() * 10 + 8 + 's';
                particle.style.background = `radial-gradient(circle, rgba(${100 + Math.random() * 155}, ${100 + Math.random() * 155}, 255, 0.8), transparent)`;
                bg.appendChild(particle);
            }
            
            for(let i = 0; i < 5; i++) {
                const glow = document.createElement('div');
                glow.classList.add('glow');
                glow.style.left = Math.random() * 100 + '%';
                glow.style.top = Math.random() * 100 + '%';
                glow.style.animationDelay = Math.random() * 5 + 's';
                bg.appendChild(glow);
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('light');
            const btn = document.querySelector('.theme-toggle');
            if(document.body.classList.contains('light')) {
                btn.textContent = '🌙';
                document.body.style.background = 'linear-gradient(135deg, #e0c3fc, #8ec5fc)';
            } else {
                btn.textContent = '☀️';
                document.body.style.background = 'linear-gradient(135deg, #0f0c29, #302b63, #24243e)';
            }
        }

        function animateEntry() {
            const card = document.getElementById('profileCard');
            const loadingScreen = document.getElementById('loadingScreen');
            
            setTimeout(() => {
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.visibility = 'hidden';
                    card.classList.add('visible');
                }, 500);
            }, 1500);
        }

        // ربط أزرار الموسيقى
        document.getElementById('playPauseBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMusic();
        });
        
        document.getElementById('musicPlayer').addEventListener('click', (e) => {
            if(e.target.closest('.play-pause')) return;
            toggleMusic();
        });

        window.addEventListener('load', () => {
            createBackgroundAnimation();
            loadSocialLinks();
            initMusic();
            animateEntry();
        });
