<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>𝐡𝐮𝐫𝐥𝐞𝐲𝐱𝐲𝐳</title>
    <link rel="icon" type="image/webp" href="https://cdn.discordapp.com/attachments/1436453150046290042/1509259653026939091/IMG_20260527_113300_812.webp">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tajawal', system-ui, sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ==============================================
           أنيميشن الدخول القوي - بدون سيوف
           ============================================== */
        .epic-intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            background: radial-gradient(ellipse at center, #000000 0%, #0a0015 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: opacity 0.8s cubic-bezier(0.23, 1, 0.32, 1), visibility 0.8s;
        }

        .epic-intro.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* الحلقات الدائرية المتوسعة */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 3px solid rgba(255, 100, 50, 0.8);
            box-shadow: 0 0 30px rgba(255, 80, 0, 0.8), inset 0 0 20px rgba(255, 100, 0, 0.5);
            animation: expandRing 1.2s ease-out forwards;
        }

        @keyframes expandRing {
            0% {
                width: 0px;
                height: 0px;
                opacity: 1;
                border-width: 4px;
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
                border-width: 1px;
            }
        }

        /* الموجات الصوتية */
        .wave-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255, 200, 100, 0.6);
            animation: waveExpand 1.5s ease-out infinite;
        }

        @keyframes waveExpand {
            0% {
                width: 50px;
                height: 50px;
                opacity: 0.8;
            }
            100% {
                width: 400px;
                height: 400px;
                opacity: 0;
            }
        }

        /* الشعار المركزي */
        .epic-logo {
            position: relative;
            z-index: 20;
            text-align: center;
            animation: logoEntrance 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .epic-logo h1 {
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff, #ffaa44, #ff6600, #ffcc88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(255, 100, 0, 0.5);
            letter-spacing: 4px;
        }

        .epic-logo p {
            color: rgba(255, 200, 100, 0.7);
            font-size: 16px;
            margin-top: 15px;
            letter-spacing: 3px;
        }

        @keyframes logoEntrance {
            0% {
                transform: scale(0) rotate(-180deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.2) rotate(0deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        /* الجسيمات المتطايرة */
        .particle-burst {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #ffaa44, #ff3300);
            border-radius: 50%;
            pointer-events: none;
            animation: burstFly 1.2s ease-out forwards;
        }

        @keyframes burstFly {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx, 150px), var(--ty, -200px)) scale(0);
                opacity: 0;
            }
        }

        /* الدخان الكثيف */
        .smoke-cloud {
            position: absolute;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(80, 60, 40, 0.7), rgba(30, 20, 10, 0));
            border-radius: 50%;
            filter: blur(15px);
            pointer-events: none;
            animation: smokeFloat 2s ease-out forwards;
        }

        @keyframes smokeFloat {
            0% {
                transform: scale(0.5) translateY(0);
                opacity: 0.8;
            }
            100% {
                transform: scale(3) translateY(-150px);
                opacity: 0;
            }
        }

        /* ومضات البرق */
        .flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 255, 200, 0.9), rgba(255, 200, 100, 0.5), transparent);
            pointer-events: none;
            opacity: 0;
            animation: flashEffect 0.15s 4;
        }

        @keyframes flashEffect {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* الخلفية المتحركة بعد الدخول */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            animation: bgShift 15s infinite alternate;
        }

        @keyframes bgShift {
            0% { filter: hue-rotate(0deg) brightness(1); }
            100% { filter: hue-rotate(20deg) brightness(1.1); }
        }

        /* النجوم المتساقطة */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.7;
            animation: starFall linear infinite;
        }

        @keyframes starFall {
            from {
                transform: translateY(-100px) translateX(0) rotate(0deg);
            }
            to {
                transform: translateY(100vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* البطاقة الرئيسية */
        .main-content {
            position: relative;
            z-index: 1;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease-in-out, visibility 0.5s;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-content.visible {
            opacity: 1;
            visibility: visible;
        }

        .profile-card {
            background: rgba(15, 25, 35, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 30px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
            animation: cardGlide 0.8s ease-out;
        }

        @keyframes cardGlide {
            from {
                transform: translateY(80px) scale(0.9);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .profile-img {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: borderRotate 3s linear infinite;
        }

        .profile-img img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.3);
        }

        @keyframes borderRotate {
            0% { background: linear-gradient(0deg, #667eea, #764ba2, #f093fb); }
            100% { background: linear-gradient(360deg, #667eea, #764ba2, #f093fb); }
        }

        .username {
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #667eea, #f093fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .handle {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-bottom: 25px;
        }

        .bio {
            text-align: center;
            color: rgba(255,255,255,0.85);
            margin-bottom: 35px;
            line-height: 1.8;
            font-size: 15px;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
            gap: 15px;
        }

        .social-btn:hover {
            transform: translateX(8px);
            background: rgba(255,255,255,0.15);
        }

        .social-icon svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        /* أدوات التحكم */
        .music-player {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            cursor: pointer;
        }

        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 24px;
            z-index: 100;
        }

        @media (max-width: 500px) {
            .epic-logo h1 { font-size: 32px; letter-spacing: 2px; }
            .profile-card { padding: 25px 20px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>

    function loadSocialLinks() {
        const container = document.getElementById('socialLinks');
        socialData.forEach(social => {
            const btn = document.createElement('a');
            btn.href = social.url;
            btn.className = 'social-btn';
            btn.target = '_blank';
            btn.innerHTML = `<div class="social-icon">${social.icon}</div><div><div>${social.name}</div><div style="font-size:12px;opacity:0.7">${social.username}</div></div>`;
            container.appendChild(btn);
        });
    }

    // ========== تأثيرات الأنيميشن القوية ==========
    
    // إنشاء حلقات متوسعة
    function createRings() {
        for(let i = 0; i < 12; i++) {
            setTimeout(() => {
                const ring = document.createElement('div');
                ring.classList.add('ring');
                ring.style.left = '50%';
                ring.style.top = '50%';
                ring.style.transform = 'translate(-50%, -50%)';
                document.getElementById('epicIntro').appendChild(ring);
                setTimeout(() => ring.remove(), 1300);
            }, i * 80);
        }
    }

    // إنشاء جسيمات متطايرة
    function createParticleBurst() {
        for(let i = 0; i < 200; i++) {
            setTimeout(() => {
                const particle = document.createElement('div');
                particle.classList.add('particle-burst');
                particle.style.left = '50%';
                particle.style.top = '50%';
                const angle = Math.random() * Math.PI * 2;
                const distance = 100 + Math.random() * 200;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance - 80;
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                document.getElementById('epicIntro').appendChild(particle);
                setTimeout(() => particle.remove(), 1200);
            }, i * 8);
        }
    }

    // إنشاء سحب دخان
    function createSmokeClouds() {
        for(let i = 0; i < 40; i++) {
            setTimeout(() => {
                const smoke = document.createElement('div');
                smoke.classList.add('smoke-cloud');
                smoke.style.left = Math.random() * 100 + '%';
                smoke.style.top = Math.random() * 100 + '%';
                document.getElementById('epicIntro').appendChild(smoke);
                setTimeout(() => smoke.remove(), 2000);
            }, i * 60);
        }
    }

    // إنشاء موجات صوتية
    function createWaveRings() {
        for(let i = 0; i < 8; i++) {
            setTimeout(() => {
                const wave = document.createElement('div');
                wave.classList.add('wave-ring');
                wave.style.left = '50%';
                wave.style.top = '50%';
                wave.style.transform = 'translate(-50%, -50%)';
                document.getElementById('epicIntro').appendChild(wave);
                setTimeout(() => wave.remove(), 1600);
            }, i * 100);
        }
    }

    // نجوم متساقطة للخلفية
    function createStars() {
        for(let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.animationDuration = Math.random() * 3 + 2 + 's';
            star.style.animationDelay = Math.random() * 10 + 's';
            document.getElementById('animatedBg').appendChild(star);
        }
    }

    // الموسيقى
    let audio = null;
    let isPlaying = false;

    function initMusic() {
        audio = new Audio();
        audio.src = 'other/sound.mp3';
        audio.loop = true;
        audio.volume = 0.3;
    }

    function toggleMusic() {
        if(!audio) return;
        if(isPlaying) {
            audio.pause();
            isPlaying = false;
            document.getElementById('playPauseBtn').textContent = '▶️';
            document.getElementById('musicStatus').textContent = '⏸';
        } else {
            audio.play().catch(() => alert('🔊 اضغط لتشغيل الموسيقى'));
            isPlaying = true;
            document.getElementById('playPauseBtn').textContent = '⏸';
            document.getElementById('musicStatus').textContent = '🎵';
        }
    }

    // تبديل الثيم
    let isLight = false;
    function toggleTheme() {
        isLight = !isLight;
        const bg = document.getElementById('animatedBg');
        if(isLight) {
            bg.style.background = 'linear-gradient(135deg, #e0c3fc, #8ec5fc)';
            document.getElementById('themeBtn').textContent = '☀️';
        } else {
            bg.style.background = 'linear-gradient(135deg, #0f0c29, #302b63, #24243e)';
            document.getElementById('themeBtn').textContent = '🌙';
        }
    }

    // تشغيل كل شيء
    window.addEventListener('load', () => {
        loadSocialLinks();
        createStars();
        initMusic();
        
        // تشغيل كل تأثيرات الأنيميشن
        createRings();
        createParticleBurst();
        createSmokeClouds();
        createWaveRings();
        
        // ومضات البرق
        const flash = document.getElementById('flash');
        flash.style.animation = 'flashEffect 0.15s 4';
        
        // إخفاء شاشة الدخول بعد الأنيميشن
        setTimeout(() => {
            document.getElementById('epicIntro').classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('epicIntro').style.display = 'none';
                document.getElementById('mainContent').classList.add('visible');
            }, 800);
        }, 2800);
        
        document.getElementById('playPauseBtn').addEventListener('click', toggleMusic);
        document.getElementById('themeBtn').addEventListener('click', toggleTheme);
    });
</script>
</body>
</html>
