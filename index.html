<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>𝐡𝐮𝐫𝐥𝐞𝐲𝐱𝐲𝐳</title>
    <link rel="icon" type="image/png" href="https://cdn.discordapp.com/attachments/1436453150046290042/1509259653026939091/IMG_20260527_113300_812.webp?ex=6a188715&is=6a173595&hm=5c89187144f01e10641be3567ca20b4d0597d69f1f354b261ffe08eb89e7334b&">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tajawal', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ========== أنيميشن دخول خفيف وسريع ========== */
        .intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            background: linear-gradient(135deg, #0f0c29, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        .intro.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .intro-content {
            text-align: center;
            animation: introBounce 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .intro-content h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #667eea, #f093fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 3px;
        }

        .intro-content p {
            color: rgba(255,255,255,0.6);
            margin-top: 12px;
            font-size: 14px;
            letter-spacing: 2px;
        }

        @keyframes introBounce {
            0% {
                transform: scale(0.7);
                opacity: 0;
            }
            70% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* جسيمات خفيفة */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: radial-gradient(circle, #667eea, #f093fb);
            border-radius: 50%;
            animation: floatUp 1.5s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-200px) scale(0);
                opacity: 0;
            }
        }

        /* الخلفية */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }

        /* النجوم */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: starFall linear infinite;
        }

        @keyframes starFall {
            from {
                transform: translateY(-100px) translateX(0);
            }
            to {
                transform: translateY(100vh) translateX(80px);
                opacity: 0;
            }
        }

        /* المحتوى الرئيسي */
        .main-content {
            position: relative;
            z-index: 1;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease-in-out, visibility 0.5s;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-content.visible {
            opacity: 1;
            visibility: visible;
        }

        /* البطاقة */
        .profile-card {
            background: rgba(15, 25, 35, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 35px 30px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
            animation: cardSlide 0.6s ease-out;
        }

        @keyframes cardSlide {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* الصورة الشخصية - رابط جديد ومضمون */
        .profile-img {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: borderRotate 3s linear infinite;
        }

        .profile-img img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.3);
        }

        @keyframes borderRotate {
            0% { background: linear-gradient(0deg, #667eea, #764ba2, #f093fb); }
            100% { background: linear-gradient(360deg, #667eea, #764ba2, #f093fb); }
        }

        .username {
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #667eea, #f093fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .handle {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-bottom: 20px;
            font-size: 14px;
        }

        .bio {
            text-align: center;
            color: rgba(255,255,255,0.85);
            margin-bottom: 35px;
            line-height: 1.7;
            font-size: 14px;
        }

        /* روابط التواصل - تصميم محسن */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-radius: 25px;
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.25s ease;
            gap: 15px;
            cursor: pointer;
        }

        .social-btn:active {
            transform: scale(0.97);
            background: rgba(255,255,255,0.15);
        }

        @media (hover: hover) {
            .social-btn:hover {
                transform: translateX(5px);
                background: rgba(255,255,255,0.15);
            }
        }

        .social-icon svg {
            width: 26px;
            height: 26px;
            fill: white;
        }

        .social-info {
            flex: 1;
        }

        .social-name {
            font-size: 15px;
            font-weight: 600;
        }

        .social-username {
            font-size: 11px;
            opacity: 0.7;
            font-family: monospace;
        }

        /* أزرار الموسيقى والثيم */
        .music-player {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.2s;
        }

        .music-player:active {
            transform: scale(0.96);
        }

        .music-icon {
            font-size: 20px;
            animation: musicSpin 3s linear infinite;
        }

        @keyframes musicSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .music-info {
            display: flex;
            flex-direction: column;
        }

        .music-title {
            font-size: 11px;
            font-weight: 600;
        }

        .music-status {
            font-size: 9px;
            opacity: 0.7;
        }

        .play-pause {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            transition: 0.1s;
        }

        .play-pause:active {
            transform: scale(0.9);
        }

        .wave {
            display: flex;
            gap: 3px;
            align-items: center;
        }

        .wave span {
            width: 3px;
            height: 10px;
            background: #a285ff;
            border-radius: 2px;
            animation: waveAnim 0.8s infinite ease;
        }

        .wave span:nth-child(1) { animation-delay: 0s; }
        .wave span:nth-child(2) { animation-delay: 0.15s; }
        .wave span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes waveAnim {
            0%, 100% { height: 8px; }
            50% { height: 18px; }
        }

        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            font-size: 22px;
            z-index: 100;
            transition: 0.2s;
        }

        .theme-toggle:active {
            transform: rotate(90deg) scale(0.95);
        }

        /* الوضع المضيء */
        body.light .animated-bg {
            background: linear-gradient(135deg, #e0c3fc, #b0d4ff, #c2e9fb);
        }
        body.light .profile-card {
            background: rgba(245, 240, 255, 0.8);
        }
        body.light .username {
            background: linear-gradient(135deg, #2c3e66, #8e2de2);
            -webkit-background-clip: text;
        }
        body.light .bio, body.light .handle, body.light .social-username, body.light .social-name {
            color: #1a1a2e;
        }
        body.light .social-btn {
            background: rgba(0,0,0,0.05);
            border-color: rgba(0,0,0,0.1);
            color: #111;
        }
        body.light .social-icon svg {
            fill: #1a1a2e;
        }

        @media (max-width: 500px) {
            .profile-card {
                padding: 25px 20px;
            }
            .username {
                font-size: 28px;
            }
            .intro-content h1 {
                font-size: 32px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>

<!-- أنيميشن الدخول الخفيف -->
<div class="intro" id="intro">
    <div class="intro-content">
        <h1>𝐡𝐮𝐫𝐥𝐞𝐲𝐱𝐲𝐳</h1>

<!-- المحتوى الرئيسي -->
<div class="main-content" id="mainContent">
    <div class="profile-card">
        <div class="profile-img">
            <!-- صورة مضمونة 100% -->
            <img id="profileImage" src="https://cdn.discordapp.com/attachments/1436453150046290042/1509259653026939091/IMG_20260527_113300_812.webp?ex=6a188715&is=6a173595&hm=5c89187144f01e10641be3567ca20b4d0597d69f1f354b261ffe08eb89e7334b&" alt="Profile">
        </div>
        <h1 class="username">hurleyxyz</h1>
        <div class="handle">@hurleyxyz</div>
        <p class="bio">
            ✨ Full Stack Developer | Creator | Tech Enthusiast ✨<br>
            Building digital experiences & sharing knowledge
        </p>
        <div class="social-links" id="socialLinks"></div>
    </div>
</div>

<!-- مشغل الموسيقى (تشغل أوتوماتيك) -->
<div class="music-player" id="musicPlayer">

    const socialData = [
        { name: "Email", username: "ufeelgg@gmail.com", icon: icons.email, url: "mailto:hurley@example.com" },
        { name: "GitHub", username: "hurleyxyz", icon: icons.github, url: "https://github.com/ufeelgg-netizen" },
        { name: "Discord", username: "hurleyxyz", icon: icons.discord, url: "https://discord.gg/WH3zqsuv" },

        { name: "WhatsApp", username: "hurleyxyz", icon: icons.whatsapp, url: "https://wa.me/94404537" },
        { name: "Instagram", username: "@hurleyxyz", icon: icons.instagram, url: "https://www.instagram.com/hurleyxyz_" },
        { name: "Facebook", username: "hurleyxyz", icon: icons.facebook, url: "https://www.facebook.com/share/1CdmnFusmC/" }
    ];

    function loadSocialLinks() {
        const container = document.getElementById('socialLinks');
        container.innerHTML = '';
        socialData.forEach(social => {
            const btn = document.createElement('a');
            btn.href = social.url;
            btn.className = 'social-btn';
            btn.target = '_blank';
            btn.innerHTML = `
                <div class="social-icon">${social.icon}</div>
                <div class="social-info">
                    <div class="social-name">${social.name}</div>
                    <div class="social-username">${social.username}</div>
                </div>
            `;
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                window.open(social.url, '_blank');
            });
            container.appendChild(btn);
        });
    }

    // نجوم
    function createStars() {
        for(let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + '%';
            star.style.width = Math.random() * 2 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.animationDuration = Math.random() * 4 + 2 + 's';
            star.style.animationDelay = Math.random() * 8 + 's';
            document.getElementById('animatedBg').appendChild(star);
        }
    }

    // جسيمات للأنترو
    function createParticles() {
        for(let i = 0; i < 50; i++) {
            setTimeout(() => {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                document.getElementById('intro').appendChild(p);
                setTimeout(() => p.remove(), 1500);
            }, i * 20);
        }
    }

    // ========== الموسيقى - تشتغل أوتوماتيك ==========
    let audio = null;
    let isPlaying = true;

    function initMusic() {
        audio = new Audio();
        audio.src = 'other/sound.mp3';
        audio.loop = true;
        audio.volume = 0.25;
        
        // محاولة تشغيل تلقائي
        audio.play().then(() => {
            isPlaying = true;
            document.getElementById('playPauseBtn').textContent = '⏸';
            document.getElementById('musicStatus').textContent = '🎵 تشغيل';
        }).catch(() => {
            isPlaying = false;
            document.getElementById('playPauseBtn').textContent = '▶️';
            document.getElementById('musicStatus').textContent = '⏸ اضغط للتشغيل';
        });
    }

    function toggleMusic() {
        if(!audio) return;
        if(isPlaying) {
            audio.pause();
            isPlaying = false;
            document.getElementById('playPauseBtn').textContent = '▶️';
            document.getElementById('musicStatus').textContent = '⏸ متوقفة';
        } else {
            audio.play();
            isPlaying = true;
            document.getElementById('playPauseBtn').textContent = '⏸';
            document.getElementById('musicStatus').textContent = '🎵 تشغيل';
        }
    }

    // تبديل الثيم
    let isLight = false;
    function toggleTheme() {
        isLight = !isLight;
        if(isLight) {
            document.body.classList.add('light');
            document.getElementById('themeBtn').textContent = '☀️';
        } else {
            document.body.classList.remove('light');
            document.getElementById('themeBtn').textContent = '🌙';
        }
    }

    // تشغيل كل شيء
    window.addEventListener('load', () => {
        loadSocialLinks();
        createStars();
        createParticles();
        initMusic();
        
        // إخفاء الأنترو بعد 1.5 ثانية
        setTimeout(() => {
            const intro = document.getElementById('intro');
            intro.classList.add('fade-out');
            setTimeout(() => {
                intro.style.display = 'none';
                document.getElementById('mainContent').classList.add('visible');
            }, 600);
        }, 1500);
        
        document.getElementById('playPauseBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMusic();
        });
        
        document.getElementById('musicPlayer').addEventListener('click', (e) => {
            if(!e.target.closest('.play-pause')) toggleMusic();
        });
        
        document.getElementById('themeBtn').addEventListener('click', toggleTheme);
    });
</script>
</body>
</html>
